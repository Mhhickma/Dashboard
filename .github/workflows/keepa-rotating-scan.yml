name: Keepa Rotating Price Scan

on:
  schedule:
    # Runs every 15 minutes all day and night.
    # GitHub cron uses UTC time.
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: keepa-rotating-price-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Keepa rotating scan
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG }}
          ASIN_CSV_URL: ${{ secrets.ASIN_CSV_URL }}
          SCAN_LIMIT: 50
          KEEPA_BATCH_SIZE: 50
          KEEPA_REQUEST_DELAY_SECONDS: 2
          KEEPA_RATE_LIMIT_WAIT_SECONDS: 70
          KEEPA_MAX_RETRIES: 5
          DEAL_TTL_HOURS: 24
        run: python fetch_keepa.py

      - name: Commit updated scan data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/deals.json data/deals_memory.json data/scan_state.json

          if git diff --cached --quiet; then
            echo "No scan data changes to commit."
          else
            git commit -m "Update Keepa rotating scan data"
            git pull --rebase origin main
            git push
          fi
